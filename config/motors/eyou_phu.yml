name: eyou_phu
description: EYou PHU servo module using the vendor-default PDO layout

vendor_eds: eds/EDS files/EYOU_ServoModule（PHU）.eds

master:
  node_id: 127
  baudrate: 1000
  # Consume the node's producer heartbeat so the master detects node loss on a
  # dedicated error-control channel, independently of TPDO cadence. The consumer
  # timeout is heartbeat_producer * heartbeat_multiplier.
  heartbeat_consumer: true
  heartbeat_producer: 0
  heartbeat_multiplier: 3.0
  sync_period: 1000
  sync_window: 0
  start: true
  start_nodes: true
  reset_all_nodes: false
  stop_all_nodes: false
  boot_time: 5000

# The node produces a 100 ms heartbeat (0x1017); the master flags it lost after
# ~300 ms (100 ms * 3.0) even if it keeps emitting TPDOs.
node:
  name: phu_joint
  node_id: 1
  mandatory: true
  boot: true
  reset_communication: true
  heartbeat_producer: 100

generation:
  generated_dir: generated/canopen/eyou_phu
  dcf_dir: dcf
  no_strict: true

identity_policy: ignore
pdo_policy: csp-minimal
mode_policy: vendor-default

# The EYou firmware ignores the EDS-default RxPDO1 (controlword + target velocity
# + modes) during CSP bring-up: it will not leave "ready to switch on" even with
# a correct controlword on the wire. The vendor's proven CSP recipe (manual
# Table 5-5 / 3.6.1) uses RxPDO1 = controlword + target position and keeps the
# mode object out of the cyclic stream. These overrides bend the generated master
# (and the summary) to that layout; RPDO2/RPDO3 are disabled because CSP only
# needs the target position, which now rides in RPDO1. TPDO feedback is left at
# the vendor default so statusword/mode/position/velocity/torque stay available.
eds_overrides:
  # RxPDO1 mapping -> controlword (0x6040:00,16) + target position (0x607A:00,32)
  "1600sub0": { DefaultValue: "2" }
  "1600sub2": { DefaultValue: "0x607A0020" }
  # Disable RxPDO2 (COB-ID valid bit set + empty mapping)
  "1401sub1": { DefaultValue: "$NODEID+0x80000300" }
  "1601sub0": { DefaultValue: "0" }
  # Disable RxPDO3
  "1402sub1": { DefaultValue: "$NODEID+0x80000400" }
  "1602sub0": { DefaultValue: "0" }
