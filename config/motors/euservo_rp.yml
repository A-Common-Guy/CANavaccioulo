name: euservo_rp
description: Yiyou EuServo RP servo module (RP EDS V1.4), cyclic superset PDO layout (CSP/CSV/CST)

vendor_eds: eds/EDS files/EuServo_RP_EDS_（RP）V1.4.eds

master:
  node_id: 127
  baudrate: 1000
  # Consume each node's producer heartbeat so the master detects node loss on a
  # dedicated error-control channel, independently of TPDO cadence. The consumer
  # timeout is heartbeat_producer * heartbeat_multiplier per node.
  heartbeat_consumer: true
  heartbeat_producer: 0
  heartbeat_multiplier: 3.0
  sync_period: 2000
  sync_window: 0
  start: true
  start_nodes: true
  reset_all_nodes: false
  stop_all_nodes: false
  boot_time: 5000

# Multiple homogeneous joints on one chain. All nodes share this same EDS and
# PDO layout, differing only by node id; dcfgen builds the master's image for
# every slave. Each node produces a 100 ms heartbeat (0x1017), so the master
# flags it lost after ~300 ms (100 ms * 3.0) even if it keeps emitting TPDOs.
nodes:
 - { name: rp_joint_1, node_id: 1, mandatory: true, boot: true, heartbeat_producer: 100 }
 - { name: rp_joint_2, node_id: 2, mandatory: false, boot: true, heartbeat_producer: 100 }
#   - { name: rp_joint_3, node_id: 3, heartbeat_producer: 100 }

generation:
  generated_dir: generated/canopen/euservo_rp
  dcf_dir: dcf
  no_strict: true

identity_policy: ignore
pdo_policy: cyclic-superset
mode_policy: sdo-at-boot

# Fixed "cyclic superset" PDO layout: one map serves CSP, CSV and CST without
# re-mapping per mode. The active mode is selected over SDO (0x6060) while the
# node is pre-operational at boot; the drive obeys the target matching that mode
# and ignores the others, so all cyclic targets can ride the bus every cycle.
#
# RxPDO1 (0x301): controlword (0x6040:00,16) + target position (0x607A:00,32)
# RxPDO2 (0x381): target velocity (0x60FF:00,32) + target torque (0x6071:00,16)
# RxPDO3: disabled (unused).
# TPDO feedback is left at the vendor default so statusword/mode/position/
# velocity/torque stay available for every mode.
eds_overrides:
  # RxPDO1 mapping -> controlword (0x6040:00,16) + target position (0x607A:00,32)
  "1600sub0": { DefaultValue: "2" }
  "1600sub2": { DefaultValue: "0x607A0020" }
  # RxPDO2 mapping -> target velocity (0x60FF:00,32) + target torque (0x6071:00,16)
  "1401sub1": { DefaultValue: "$NODEID+0x300" }
  "1601sub0": { DefaultValue: "2" }
  "1601sub1": { DefaultValue: "0x60FF0020" }
  "1601sub2": { DefaultValue: "0x60710010" }
  # Disable RxPDO3
  "1402sub1": { DefaultValue: "$NODEID+0x80000400" }
  "1602sub0": { DefaultValue: "0" }

# Runtime settings for this actuator, recorded verbatim in the generated
# summary.json and applied by the C++ runtime (config::resolveMotorConfig) to
# every MotorConfig field left at its built-in default. This file is the single
# source of truth for actuator scaling, watchdog windows and homing defaults;
# tune them here and regenerate.
runtime:
  # Output-shaft encoder counts per revolution of 0x6064 (19-bit encoder).
  counts_per_rev: 524288
  # Feedback-staleness watchdog window (0 disables).
  feedback_timeout_ms: 100
  # Timeout for each DS402 state transition.
  state_transition_timeout_ms: 2000
  # Guard for boot-time CSP targets, in counts.
  max_position_step: 10000
  # Hardstop-midpoint homing defaults (drive velocity/torque units); the
  # application supplies the leg-specific home_offset.
  homing:
    search_velocity: 25000
    approach_velocity: 24000
    center_velocity: 24000
    center_final_velocity: 4000
    center_slowdown_distance: 1000
    backoff_distance: 2000
    center_tolerance: 50
    center_settle_tolerance: 200
    min_travel: 1000
    max_travel: 2000000
    threshold_torque: 90
    stopped_velocity: 200
    contact_dwell_ms: 20
    settle_time_ms: 200
    timeout_ms: 30000
    save_zero_to_nvm: true
